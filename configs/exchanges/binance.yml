exchange: binance
region: global
environment: prod
base_url: https://api.binance.com
derivatives_url: https://fapi.binance.com
websocket_url: wss://stream.binance.com:9443/ws
lake_root: ./lake
temp_root: ./lake/tmp
poll_interval: 1m
http_timeout: 15s
max_batch_size: 100
datasets:
  - instruments
  - tickers
  - trades
  - klines
  - orderbook_snapshots
  - funding_rates
  - open_interest
  - trades_stream
  - orderbook_deltas
  - liquidations_stream
markets:
  - spot
  - linear_perpetual
worker_mode: loop
enable_cleanup: true
schema_version: v1
producer_version: 0.1.0
default_symbols:
  - BTCUSDT
max_retries: 3
retry_backoff: 2s
health_max_age: 5m
