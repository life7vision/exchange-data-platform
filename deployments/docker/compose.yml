        reservations:
          cpus: '0.25'
          memory: 256M
    env_file:
      - .env
    environment:
      - TZ=UTC
      - EXCHANGE=bybit
    healthcheck:
      test: ["CMD", "/app/health-probe", "-addr", "http://127.0.0.1:8081/livez"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  binance-tr-worker:
