services:
  scheduler:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    entrypoint: ["/app/scheduler"]
    restart: unless-stopped
    profiles: ["ops"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    env_file:
      - .env
    environment:
      - TZ=UTC

  binance-worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    entrypoint: ["/app/exchange-worker"]
    command: ["-config", "/app/configs/exchanges/binance.yml", "-health-addr", ":8080"]
    restart: unless-stopped
    volumes:
      - ../../lake:/app/lake
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    env_file:
      - .env
    environment:
      - TZ=UTC
      - EXCHANGE=binance
    healthcheck:
      test: ["CMD", "/app/health-probe", "-addr", "http://127.0.0.1:8080/livez"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bybit-worker:
