services:
  scheduler:
    profiles: []
    restart: always
    volumes:
      - ${LAKE_ROOT:-/opt/exchange-data-platform/lake}:/app/lake
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 384M

  binance-worker:
    restart: always
    volumes:
      - ${LAKE_ROOT:-/opt/exchange-data-platform/lake}:/app/lake
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '1.0'
          memory: 512M

  bybit-worker:
    restart: always
    volumes:
      - ${LAKE_ROOT:-/opt/exchange-data-platform/lake}:/app/lake
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '1.0'
          memory: 512M

  binance-tr-worker:
    restart: always
    volumes:
      - ${LAKE_ROOT:-/opt/exchange-data-platform/lake}:/app/lake
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '1.0'
          memory: 512M

  bybit-tr-worker:
    restart: always
    volumes:
      - ${LAKE_ROOT:-/opt/exchange-data-platform/lake}:/app/lake
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '1.0'
          memory: 512M
